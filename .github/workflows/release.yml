name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux-amd64
            use_cross: false
          - target: aarch64-unknown-linux-musl
            name: linux-arm64
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Install musl-tools
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build natively
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/rustyfile
          if-no-files-found: error

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-amd64
          path: binaries/linux-amd64/

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-arm64
          path: binaries/linux-arm64/

      - name: Package release archives
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          for platform in linux-amd64 linux-arm64; do
            ARCHIVE="rustyfile-${VERSION}-${platform}"
            mkdir -p "dist/${ARCHIVE}"
            cp "binaries/${platform}/rustyfile" "dist/${ARCHIVE}/"
            chmod +x "dist/${ARCHIVE}/rustyfile"
            cp README.md LICENSE "dist/${ARCHIVE}/" 2>/dev/null || true
            cd dist && tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz*
          generate_release_notes: true

  docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-amd64
          path: build/linux/amd64/

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-arm64
          path: build/linux/arm64/

      - name: Make binaries executable
        run: chmod +x build/linux/*/rustyfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
